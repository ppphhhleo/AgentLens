schema_version: "0.1"
id: domsteer_claude_toolcall_smoke
description: >
  Small Claude tool-call smoke collection for DataVoyager. This proves the
  Anthropic backend without expanding the OpenAI model x harness matrix.

models:
  - id: claude_sonnet46
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.0
    vision: true
    max_output_tokens: 1024
    extra:
      interaction_backend: tool_call

tool_harnesses:
  - id: browser_only
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - task.final_answer
    prompt_version: tool_call_v1
    extra:
      headless: true
      settle_ms: 2000
      slow_mo_ms: 350
      viewport: {width: 1600, height: 900}
      screenshot_source: browser_viewport
      coordinate_frame: browser_viewport
      parallel_tool_calls: true
      max_actions_per_round: 5
      model_max_attempts: 6
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: datavoyager_most_fuel_efficient
    benchmark: domsteer
    task_id: datavoyager.most_fuel_efficient
    goal: What is the most fuel-efficient car in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: Mazda GLC
    answer_validator: contains
    extra:
      canonical_task: datavoyager_most_fuel_efficient
      task_family: visual_analytics

runs:
  - id: dv_most_fuel__claude_sonnet46__browser
    model: claude_sonnet46
    tool_harness: browser_only
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    output_dir: agentlens_results/domsteer_claude_toolcall_smoke
    tags: [domsteer, datavoyager, smoke, browser_only, claude_sonnet46]
