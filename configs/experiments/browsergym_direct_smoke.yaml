schema_version: "0.1"
id: browsergym_direct_smoke
description: >
  No-model smoke test for AgentLens. It launches BrowserGym directly on a local
  data URL, clicks the first button, and writes a real trajectory.

models:
  - id: scripted_no_model
    provider: local
    name: scripted
    temperature: 0.0
    vision: false

tool_harnesses:
  - id: browsergym_direct_scripted
    runner: browsergym_direct
    tier: browser_only
    tools:
      - browser.observe
      - browser.click
      - browser.noop
    prompt_version: scripted_v1
    extra:
      headless: true

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: local_click_button
    benchmark: browsergym
    task_id: browsergym/openended
    goal: Click the Done button on a local page.
    start_url: "data:text/html,<html><body><button id=done onclick=\"document.body.dataset.clicked='yes'\">Done</button></body></html>"
    capability_required:
      - browser_ui
    validator: action_error_free
    extra:
      scripted_policy: click_first_button

runs:
  - id: smoke_click
    model: scripted_no_model
    tool_harness: browsergym_direct_scripted
    memory_harness: no_memory
    task: local_click_button
    seeds: [0]
    trials: 1
    max_steps: 1
    output_dir: agentlens_results/browsergym_direct_smoke
    tags:
      - smoke
      - no_model
