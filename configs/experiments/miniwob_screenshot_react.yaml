schema_version: "0.1"
id: miniwob_screenshot_react
description: >
  Five MiniWoB++ tasks running through our screenshot ReAct loop via the
  BrowserGym bridge. BrowserGym's ground-truth task.validate() provides
  the score. Requires MINIWOB_URL set in .env (clone Farama-Foundation
  miniwob-plusplus first).

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

  - id: mock_screenshot_react
    provider: local
    name: mock_screenshot_react
    temperature: 0.0
    vision: true

tool_harnesses:
  - id: bg_bridge
    runner: browsergym_bridge
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      slow_mo_ms: 0
      # MiniWoB tasks have small native viewports (~332x214). Don't override
      # — let BrowserGym set the right size for each task.

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: miniwob_click_test
    benchmark: browsergym
    task_id: miniwob.click-test
    goal: ""  # actual goal pulled from BrowserGym obs at runtime
    capability_required: [browser_ui]
    validator: browsergym_task_validate

  - id: miniwob_click_button
    benchmark: browsergym
    task_id: miniwob.click-button
    goal: ""
    capability_required: [browser_ui]
    validator: browsergym_task_validate

  - id: miniwob_enter_text
    benchmark: browsergym
    task_id: miniwob.enter-text
    goal: ""
    capability_required: [browser_ui, text_input]
    validator: browsergym_task_validate

  - id: miniwob_choose_list
    benchmark: browsergym
    task_id: miniwob.choose-list
    goal: ""
    capability_required: [browser_ui]
    validator: browsergym_task_validate

  - id: miniwob_click_checkboxes
    benchmark: browsergym
    task_id: miniwob.click-checkboxes
    goal: ""
    capability_required: [browser_ui]
    validator: browsergym_task_validate

runs:
  - id: miniwob_click_test_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: miniwob_click_test
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/miniwob_screenshot_react
    tags: [miniwob, gpt5]

  - id: miniwob_click_button_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: miniwob_click_button
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/miniwob_screenshot_react
    tags: [miniwob, gpt5]

  - id: miniwob_enter_text_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: miniwob_enter_text
    seeds: [0]
    trials: 1
    max_steps: 12
    output_dir: agentlens_results/miniwob_screenshot_react
    tags: [miniwob, gpt5]

  - id: miniwob_choose_list_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: miniwob_choose_list
    seeds: [0]
    trials: 1
    max_steps: 12
    output_dir: agentlens_results/miniwob_screenshot_react
    tags: [miniwob, gpt5]

  - id: miniwob_click_checkboxes_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: miniwob_click_checkboxes
    seeds: [0]
    trials: 1
    max_steps: 12
    output_dir: agentlens_results/miniwob_screenshot_react
    tags: [miniwob, gpt5]
