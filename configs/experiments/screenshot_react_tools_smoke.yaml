schema_version: "0.1"
id: screenshot_react_tools_smoke
description: >
  No-model smoke test for OpenAI computer-use-style screenshot actions on a
  visible local HTML page.

models:
  - id: mock_screenshot_react
    provider: local
    name: mock_screenshot_react
    temperature: 0.0
    vision: true

tool_harnesses:
  - id: screenshot_react_browser
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      settle_ms: 1000
      viewport:
        width: 800
        height: 600

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: local_action_tools
    benchmark: custom
    task_id: local.action_tools
    goal: Click five visible buttons on the AgentLens local smoke page.
    start_url: file:///Users/pan00342/Documents/Projects/AgentLens/fixtures/screenshot_react_tools_smoke.html
    capability_required: [browser_ui]
    validator: final_answer
    expected_answer: five clicks complete
    answer_validator: exact
    extra:
      mock_actions:
        - type: click
          x: 127
          y: 278
          button: left
        - type: wait
          ms: 700
        - type: click
          x: 288
          y: 278
          button: left
        - type: wait
          ms: 700
        - type: click
          x: 448
          y: 278
          button: left
        - type: wait
          ms: 700
        - type: click
          x: 610
          y: 278
          button: left
        - type: wait
          ms: 700
        - type: click
          x: 770
          y: 278
          button: left
        - type: wait
          ms: 1200
        - type: final_answer
          answer: five clicks complete

runs:
  - id: local_action_tools_mock
    model: mock_screenshot_react
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: local_action_tools
    seeds: [0]
    trials: 1
    max_steps: 11
    output_dir: agentlens_results/screenshot_react_tools_smoke
    tags: [smoke, screenshot_react, tools]
