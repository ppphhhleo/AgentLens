schema_version: "0.1"
id: online_mind2web_multitool
description: >
  Cut 1 smoke. Same 3 OM2W tasks we already baselined, but each task runs
  in its own sandboxed AIO Sandbox container with web_search + run_python
  + shell + read_file + write_file available. Memory scope=NONE so each
  task gets a fresh container.

  Compare against agentlens_results/online_mind2web_screenshot_react/
  2026-04-28_initial-5tasks/ (browser-only baseline) and
  online_mind2web_with_search snapshot (browser + web_search).

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

tool_harnesses:
  - id: bg_sandbox_full
    runner: screenshot_react
    tier: full_sandbox
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      browser_source: aio_sandbox
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      viewport:
        width: 1600
        height: 900

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: om2w_imp_0
    benchmark: online_mind2web
    task_id: imp_0
    goal: What is the weather in Paris yesterday in Celsius? Answer with the number only.
    start_url: https://www.google.com/
    capability_required: [browser_ui, web_search, qa]
    validator: webjudge
    answer_validator: webjudge
    extra:
      level: easy
      judge_model: gpt-5.4

  - id: om2w_test_0
    benchmark: online_mind2web
    task_id: test_0
    goal: Which "SmartLess" episode does not include the names of the SmartLess hosts in its title?
    start_url: https://www.google.com/
    capability_required: [browser_ui, web_search, qa]
    validator: webjudge
    answer_validator: webjudge
    extra:
      level: medium
      judge_model: gpt-5.4

  - id: om2w_test_3
    benchmark: online_mind2web
    task_id: test_3
    goal: What is the earliest version of the Yoast plugin available for download?
    start_url: https://www.google.com/
    capability_required: [browser_ui, web_search, qa]
    validator: webjudge
    answer_validator: webjudge
    extra:
      level: medium
      judge_model: gpt-5.4

runs:
  - id: om2w_imp_0_multitool
    model: gpt5_vision
    tool_harness: bg_sandbox_full
    memory_harness: no_memory
    task: om2w_imp_0
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/online_mind2web_multitool
    tags: [online_mind2web, gpt5, multitool, sandbox]

  - id: om2w_test_0_multitool
    model: gpt5_vision
    tool_harness: bg_sandbox_full
    memory_harness: no_memory
    task: om2w_test_0
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/online_mind2web_multitool
    tags: [online_mind2web, gpt5, multitool, sandbox]

  - id: om2w_test_3_multitool
    model: gpt5_vision
    tool_harness: bg_sandbox_full
    memory_harness: no_memory
    task: om2w_test_3
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/online_mind2web_multitool
    tags: [online_mind2web, gpt5, multitool, sandbox]
