schema_version: "0.1"
id: domsteer_datavoyager_toolcall_matrix
description: >
  GPT-5.4 DataVoyager smoke collection across three harness tiers:
  browser-only GUI, full sandbox, and no-GUI tools.

models:
  - id: gpt54
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024
    extra:
      interaction_backend: tool_call

tool_harnesses:
  - id: browser_only
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - task.final_answer
    prompt_version: tool_call_v1
    extra:
      headless: true
      settle_ms: 2000
      slow_mo_ms: 350
      viewport: {width: 1600, height: 900}
      screenshot_source: browser_viewport
      coordinate_frame: browser_viewport
      parallel_tool_calls: true
      max_actions_per_round: 5
      model_max_attempts: 6
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

  - id: full_sandbox
    runner: screenshot_react
    tier: full_sandbox
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: tool_call_v1
    extra:
      browser_source: aio_sandbox
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      headless: true
      settle_ms: 1000
      stealth: true
      viewport: {width: 1600, height: 900}
      screenshot_source: browser_viewport
      coordinate_frame: browser_viewport
      parallel_tool_calls: true
      max_actions_per_round: 5
      model_max_attempts: 6
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

  - id: no_gui_tool_only
    runner: screenshot_react
    tier: full_sandbox
    tools:
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: tool_call_v1
    extra:
      browser_source: aio_sandbox
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      headless: true
      settle_ms: 1000
      stealth: true
      viewport: {width: 1600, height: 900}
      input_modes: [axtree]
      screenshot_source: browser_viewport
      coordinate_frame: browser_viewport
      parallel_tool_calls: true
      max_actions_per_round: 3
      model_max_attempts: 6
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: datavoyager_most_fuel_efficient
    benchmark: domsteer
    task_id: datavoyager.most_fuel_efficient
    goal: What is the most fuel-efficient car in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: Mazda GLC
    answer_validator: contains
    extra:
      canonical_task: datavoyager_most_fuel_efficient
      task_family: visual_analytics

runs:
  - id: dv_most_fuel__gpt54__browser
    model: gpt54
    tool_harness: browser_only
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    output_dir: agentlens_results/domsteer_datavoyager_toolcall_matrix/raw
    tags: [domsteer, datavoyager, smoke, browser_only, gpt54]

  - id: dv_most_fuel__gpt54__sandbox
    model: gpt54
    tool_harness: full_sandbox
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    output_dir: agentlens_results/domsteer_datavoyager_toolcall_matrix/raw
    tags: [domsteer, datavoyager, smoke, full_sandbox, gpt54]

  - id: dv_most_fuel__gpt54__nogui
    model: gpt54
    tool_harness: no_gui_tool_only
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    output_dir: agentlens_results/domsteer_datavoyager_toolcall_matrix/raw
    tags: [domsteer, datavoyager, smoke, no_gui_tool_only, gpt54]
