schema_version: "0.1"
id: domsteer_screenshot_react
description: >
  Real model-backed screenshot ReAct runs on three DOMSteer tasks.
  Requires OPENAI_API_KEY in .env at the repo root.

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

tool_harnesses:
  - id: screenshot_react_browser
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      settle_ms: 2000
      # Live-mode pacing so a human can watch each action; ignored when headless.
      slow_mo_ms: 350
      viewport:
        width: 1600
        height: 900

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: tf_discretize_toggle
    benchmark: domsteer
    task_id: tfplayground.discretize_toggle
    goal: >
      Find the "Discretize output" toggle in the TensorFlow Playground UI and
      click it. Then describe what visibly changed in the output panel after the
      toggle. You MUST click the toggle before answering — do not answer from
      prior knowledge alone.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: "discretize=true"
    answer_validator: url_contains

  - id: datavoyager_most_fuel_efficient
    benchmark: domsteer
    task_id: datavoyager.most_fuel_efficient
    goal: What is the most fuel-efficient car in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: Mazda GLC
    answer_validator: exact

  - id: datavoyager_europe_100hp_4cyl_count
    benchmark: domsteer
    task_id: datavoyager.europe_100hp_4cyl_count
    goal: How many Europe cars have horsepower under 100 and 4 cylinders?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: "10"
    answer_validator: exact

  - id: datavoyager_horsepower_range_by_origin
    benchmark: domsteer
    task_id: datavoyager.horsepower_range_by_origin
    goal: Which origin's cars show the widest range of horsepower?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: semantic pending
    answer_validator: semantic_pending

  - id: datavoyager_8_cylinder_characteristics
    benchmark: domsteer
    task_id: datavoyager.8_cylinder_characteristics
    goal: What characteristics do cars with 8 cylinders have?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: semantic pending
    answer_validator: semantic_pending

  - id: tf_wrongly_classified_point
    benchmark: domsteer
    task_id: tfplayground.wrongly_classified_point
    goal: Locate one example data point that is wrongly classified.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending

  - id: tf_general_regression_network
    benchmark: domsteer
    task_id: tfplayground.general_regression_network
    goal: Design a single generalizable neural network that works on all regression datasets.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending

  - id: tf_general_classification_network
    benchmark: domsteer
    task_id: tfplayground.general_classification_network
    goal: Design a single generalized neural network that works on all four classification datasets.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending

runs:
  - id: tf_discretize_toggle_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 12
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, tfplayground, gpt5]

  - id: datavoyager_most_fuel_efficient_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    max_steps: 15
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, datavoyager, gpt5]

  - id: datavoyager_europe_100hp_4cyl_count_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: datavoyager_europe_100hp_4cyl_count
    seeds: [0]
    trials: 1
    max_steps: 15
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, datavoyager, gpt5]

  - id: datavoyager_horsepower_range_by_origin_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: datavoyager_horsepower_range_by_origin
    seeds: [0]
    trials: 1
    max_steps: 15
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, datavoyager, gpt5, semantic_pending]

  - id: datavoyager_8_cylinder_characteristics_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: datavoyager_8_cylinder_characteristics
    seeds: [0]
    trials: 1
    max_steps: 15
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, datavoyager, gpt5, semantic_pending]

  - id: tf_wrongly_classified_point_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: tf_wrongly_classified_point
    seeds: [0]
    trials: 1
    max_steps: 12
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, tfplayground, gpt5, manual_pending]

  - id: tf_general_regression_network_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: tf_general_regression_network
    seeds: [0]
    trials: 1
    max_steps: 20
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, tfplayground, gpt5, manual_pending]

  - id: tf_general_classification_network_gpt5
    model: gpt5_vision
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: tf_general_classification_network
    seeds: [0]
    trials: 1
    max_steps: 20
    output_dir: agentlens_results/domsteer_screenshot_react
    tags: [domsteer, tfplayground, gpt5, manual_pending]
