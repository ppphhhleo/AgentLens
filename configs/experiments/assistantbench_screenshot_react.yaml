schema_version: "0.1"
id: assistantbench_screenshot_react
description: >
  AssistantBench tasks via the BrowserGym bridge. Open-ended question
  answering on real public websites (starts at google.com). Validation
  passes the agent's final_answer to BrowserGym's question_scorer.

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

tool_harnesses:
  - id: bg_bridge
    runner: browsergym_bridge
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      slow_mo_ms: 0

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

# Five validation tasks (browsergym/assistantbench.imp.0 is the only "imp"
# example; the rest are .test.* tasks from the public AssistantBench split).
tasks:
  - id: assistantbench_imp_0
    benchmark: browsergym
    task_id: assistantbench.imp.0
    goal: ""  # pulled from BrowserGym obs at runtime
    capability_required: [browser_ui, web_search, qa]
    validator: browsergym_task_validate

  - id: assistantbench_test_0
    benchmark: browsergym
    task_id: assistantbench.test.0
    goal: ""
    capability_required: [browser_ui, web_search, qa]
    validator: browsergym_task_validate

  - id: assistantbench_test_1
    benchmark: browsergym
    task_id: assistantbench.test.1
    goal: ""
    capability_required: [browser_ui, web_search, qa]
    validator: browsergym_task_validate

  - id: assistantbench_test_2
    benchmark: browsergym
    task_id: assistantbench.test.2
    goal: ""
    capability_required: [browser_ui, web_search, qa]
    validator: browsergym_task_validate

  - id: assistantbench_test_3
    benchmark: browsergym
    task_id: assistantbench.test.3
    goal: ""
    capability_required: [browser_ui, web_search, qa]
    validator: browsergym_task_validate

runs:
  - id: assistantbench_imp_0_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: assistantbench_imp_0
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/assistantbench_screenshot_react
    tags: [assistantbench, gpt5]

  - id: assistantbench_test_0_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: assistantbench_test_0
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/assistantbench_screenshot_react
    tags: [assistantbench, gpt5]

  - id: assistantbench_test_1_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: assistantbench_test_1
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/assistantbench_screenshot_react
    tags: [assistantbench, gpt5]

  - id: assistantbench_test_2_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: assistantbench_test_2
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/assistantbench_screenshot_react
    tags: [assistantbench, gpt5]

  - id: assistantbench_test_3_gpt5
    model: gpt5_vision
    tool_harness: bg_bridge
    memory_harness: no_memory
    task: assistantbench_test_3
    seeds: [0]
    trials: 1
    max_steps: 25
    output_dir: agentlens_results/assistantbench_screenshot_react
    tags: [assistantbench, gpt5]
