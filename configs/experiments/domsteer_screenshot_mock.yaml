schema_version: "0.1"
id: domsteer_screenshot_mock
description: >
  Screenshot-only ReAct mock suite for DOMSteer-inspired DataVoyager and
  TensorFlow Playground tasks. This captures live screenshots and validates
  configured mock final answers without calling an external model.

models:
  - id: mock_screenshot_react
    provider: local
    name: mock_screenshot_react
    temperature: 0.0
    vision: true

tool_harnesses:
  - id: screenshot_react_browser
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      settle_ms: 2000
      viewport:
        width: 1280
        height: 720

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: datavoyager_most_fuel_efficient
    benchmark: domsteer
    task_id: datavoyager.most_fuel_efficient
    goal: What is the most fuel-efficient car in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: Mazda GLC
    answer_validator: exact
    extra:
      mock_answer: Mazda GLC

  - id: datavoyager_horsepower_range_by_origin
    benchmark: domsteer
    task_id: datavoyager.horsepower_range_by_origin
    goal: Which origin's cars show the widest range of horsepower?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: semantic pending
    answer_validator: semantic_pending
    extra:
      mock_answer: semantic pending

  - id: datavoyager_europe_100hp_4cyl_count
    benchmark: domsteer
    task_id: datavoyager.europe_100hp_4cyl_count
    goal: How many Europe cars have horsepower under 100 and 4 cylinders?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: "10"
    answer_validator: exact
    extra:
      mock_answer: "10"

  - id: datavoyager_8_cylinder_characteristics
    benchmark: domsteer
    task_id: datavoyager.8_cylinder_characteristics
    goal: What characteristics do cars with 8 cylinders have?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: semantic pending
    answer_validator: semantic_pending
    extra:
      mock_answer: semantic pending

  - id: tf_discretize_toggle
    benchmark: domsteer
    task_id: tfplayground.discretize_toggle
    goal: Describe what the discretize toggle does to the output visualization.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: semantic pending
    answer_validator: semantic_pending
    extra:
      mock_answer: semantic pending

  - id: tf_wrongly_classified_point
    benchmark: domsteer
    task_id: tfplayground.wrongly_classified_point
    goal: Locate one example data point that is wrongly classified.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending
    extra:
      mock_answer: manual pending

  - id: tf_general_regression_network
    benchmark: domsteer
    task_id: tfplayground.general_regression_network
    goal: Design a single generalizable neural network that works on all regression datasets.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending
    extra:
      mock_answer: manual pending

  - id: tf_general_classification_network
    benchmark: domsteer
    task_id: tfplayground.general_classification_network
    goal: Design a single generalized neural network that works on all four classification datasets.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui, visual_reasoning]
    validator: final_answer
    expected_answer: manual pending
    answer_validator: manual_pending
    extra:
      mock_answer: manual pending

runs:
  - id: datavoyager_most_fuel_efficient_mock
    model: mock_screenshot_react
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    max_steps: 1
    output_dir: agentlens_results/domsteer_screenshot_mock
    tags: [domsteer, datavoyager, mock]

  - id: datavoyager_horsepower_range_by_origin_mock
    model: mock_screenshot_react
    tool_harness: screenshot_react_browser
    memory_harness: no_memory
