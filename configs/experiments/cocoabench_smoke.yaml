schema_version: "0.1"
id: cocoabench_smoke
description: >
  CocoaBench smoke test on the eight-puzzle-game example task.
  Runs through our screenshot ReAct loop inside an AIO Sandbox container
  (the task's Dockerfile is `FROM ghcr.io/agent-infra/sandbox:latest`).
  Validation is the task's own test.py.

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

tool_harnesses:
  - id: cocoabench_full
    runner: cocoabench
    tier: full_sandbox
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport:
        width: 1600
        height: 900

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: eight_puzzle_game
    benchmark: cocoabench
    task_id: eight-puzzle-game
    goal: ""  # actual instruction loaded from task.yaml at runtime
    start_url: https://8puzzle-game.vercel.app/
    capability_required: [browser_ui, code_execution, planning]
    validator: cocoabench_test_py
    answer_validator: cocoabench_test_py
    extra:
      task_dir: ~/.cache/agentlens/cocoa-agent/cocoabench-example-tasks/eight-puzzle-game

runs:
  - id: eight_puzzle_game_gpt5
    model: gpt5_vision
    tool_harness: cocoabench_full
    memory_harness: no_memory
    task: eight_puzzle_game
    seeds: [0]
    trials: 1
    max_steps: 30
    output_dir: agentlens_results/cocoabench_smoke
    tags: [cocoabench, gpt5, eight_puzzle]
