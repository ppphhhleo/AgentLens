schema_version: "0.1"
id: domsteer_datavoyager_matrix
description: >
  Factorial DataVoyager trajectory collection for comparing model and harness
  effects on complex visual analytics tasks.

models:
  - id: gpt54_mini
    provider: openai
    name: gpt-5.4-mini
    temperature: 0.0
    vision: true
    max_output_tokens: 1024
    extra:
      interaction_backend: tool_call

  - id: gpt4o_mini
    provider: openai
    name: gpt-4o-mini
    temperature: 0.0
    vision: true
    max_output_tokens: 1024
    extra:
      interaction_backend: tool_call

  - id: gpt5_mini
    provider: openai
    name: gpt-5-mini
    temperature: 0.0
    vision: true
    max_output_tokens: 1024
    extra:
      interaction_backend: tool_call

tool_harnesses:
  - id: browser_only
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      settle_ms: 2000
      slow_mo_ms: 350
      viewport: {width: 1600, height: 900}
      intervention:
        enabled: true
        repeated_action:
          enabled: true
          threshold: 5
          mode: warn
          signature: type
          message: "You are repeating the same action. Pause, inspect the screen, and try a different strategy."

  - id: full_sandbox
    runner: screenshot_react
    tier: full_sandbox
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.type
      - browser.scroll
      - browser.wait
      - browser.move
      - browser.keypress
      - browser.drag
      - browser.goto
      - browser.back
      - browser.forward
      - browser.reload
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      browser_source: aio_sandbox
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      headless: true
      settle_ms: 1000
      stealth: true
      viewport: {width: 1600, height: 900}
      intervention:
        enabled: true
        repeated_action:
          enabled: true
          threshold: 5
          mode: warn
          signature: type
          message: "You are repeating the same action. Pause, inspect the screen, and try a different strategy."

  - id: no_gui_tool_only
    runner: screenshot_react
    tier: full_sandbox
    tools:
      - web.openai_search
      - code.run_python
      - code.shell
      - files.read
      - files.write
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      browser_source: aio_sandbox
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      headless: true
      settle_ms: 1000
      stealth: true
      viewport: {width: 1600, height: 900}
      input_modes: [axtree]
      intervention:
        enabled: true
        repeated_action:
          enabled: true
          threshold: 5
          mode: warn
          signature: type
          message: "You are repeating the same tool type. Pause, inspect the tool output, and try a different strategy."

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: datavoyager_most_fuel_efficient
    benchmark: domsteer
    task_id: datavoyager.most_fuel_efficient
    goal: What is the most fuel-efficient car in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: Mazda GLC
    answer_validator: contains
    extra:
      canonical_task: datavoyager_most_fuel_efficient
      task_family: visual_analytics

  - id: datavoyager_europe_100hp_4cyl_count
    benchmark: domsteer
    task_id: datavoyager.europe_100hp_4cyl_count
    goal: How many Europe cars have horsepower under 100 and 4 cylinders?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: "10"
    answer_validator: number_exact
    extra:
      canonical_task: datavoyager_europe_100hp_4cyl_count
      task_family: visual_analytics

  - id: datavoyager_horsepower_range_by_origin
    benchmark: domsteer
    task_id: datavoyager.horsepower_range_by_origin
    goal: Which origin's cars show the widest range of horsepower?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: USA
    answer_validator: exact
    extra:
      canonical_task: datavoyager_horsepower_range_by_origin
      task_family: visual_analytics
      task_registry_only: true

  - id: datavoyager_8_cylinder_origin
    benchmark: domsteer
    task_id: datavoyager.8_cylinder_origin
    goal: What origin are all cars with 8 cylinders from in the dataset?
    start_url: https://vega.github.io/voyager2/
    capability_required: [browser_ui, visual_reasoning, data_analysis]
    validator: final_answer
    expected_answer: USA
    answer_validator: exact
    extra:
      canonical_task: datavoyager_8_cylinder_origin
      task_family: visual_analytics
      task_registry_only: true

runs:
  - id: dv_most_fuel__gpt54mini__browser
    model: gpt54_mini
    tool_harness: browser_only
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    max_steps: 15
    output_dir: agentlens_results/domsteer_datavoyager_matrix
    tags: [domsteer, datavoyager, matrix, browser_only, gpt54_mini]

  - id: dv_most_fuel__gpt54mini__sandbox
    model: gpt54_mini
    tool_harness: full_sandbox
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
