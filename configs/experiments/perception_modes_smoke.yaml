schema_version: "0.1"
id: perception_modes_smoke
description: >
  D1+D2 smoke. Same TF Playground task (click discretize toggle) run
  three ways:
    1. screenshot+coordinate (current default) — for regression
    2. axtree+bid (DOM-React only)
    3. screenshot+axtree+bid (max-info hybrid; browser-use style)

  Compare trajectory shape, step count, and tool usage. Validator
  (url_contains 'discretize=true') is the same across all three —
  whichever path the agent takes, the URL state is the ground truth.

models:
  - id: gpt5_vision
    provider: openai
    name: gpt-5.4
    temperature: 0.0
    vision: true
    max_output_tokens: 1024

tool_harnesses:
  # Mode A: screenshot only, coordinate addressing (existing baseline)
  - id: screenshot_coord
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.scroll
      - browser.move
      - browser.type
      - browser.keypress
      - browser.wait
      - browser.goto
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      input_modes: [screenshot]
      addressing_modes: [coordinate]
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport: {width: 1600, height: 900}

  # Mode B: AXTree only, bid addressing (DOM-React)
  - id: axtree_bid
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.click
      - browser.double_click
      - browser.scroll
      - browser.move
      - browser.type
      - browser.keypress
      - browser.wait
      - browser.goto
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      input_modes: [axtree]
      addressing_modes: [bid]
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport: {width: 1600, height: 900}

  # Mode C: screenshot + AXTree, both addressing modes (hybrid)
  - id: hybrid_screenshot_axtree
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.scroll
      - browser.move
      - browser.type
      - browser.keypress
      - browser.wait
      - browser.goto
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      input_modes: [screenshot, axtree]
      addressing_modes: [coordinate, bid]
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport: {width: 1600, height: 900}

  # Mode D: Set-of-Marks (Anthropic computer-use style).
  # Screenshot includes labeled boxes M1, M2, ...; agent emits clicks
  # by mark id. We resolve mark→bid via the page-side registry.
  - id: set_of_marks
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.scroll
      - browser.move
      - browser.type
      - browser.keypress
      - browser.wait
      - browser.goto
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      input_modes: [set_of_marks]
      addressing_modes: [mark]
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport: {width: 1600, height: 900}

  # Mode E: SoM + AXTree (the actual browser-use recipe).
  # Both visual marks AND textual element labels — most robust.
  - id: marks_plus_axtree
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.screenshot
      - browser.click
      - browser.double_click
      - browser.scroll
      - browser.move
      - browser.type
      - browser.keypress
      - browser.wait
      - browser.goto
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      input_modes: [set_of_marks, axtree]
      addressing_modes: [mark, bid]
      headless: true
      slow_mo_ms: 0
      settle_ms: 2000
      stealth: true
      viewport: {width: 1600, height: 900}

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: tf_discretize_toggle
    benchmark: domsteer
    task_id: tfplayground.discretize_toggle
    goal: >
      Click the "Discretize output" toggle in the TensorFlow Playground UI
      and then describe what changed in the output panel. You MUST click
      the toggle before answering.
    start_url: https://playground.tensorflow.org/
    capability_required: [browser_ui]
    validator: final_answer
    expected_answer: "discretize=true"
    answer_validator: url_contains

runs:
  - id: tf_screenshot_coord
    model: gpt5_vision
    tool_harness: screenshot_coord
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/perception_modes_smoke
    tags: [perception, screenshot, coordinate]

  - id: tf_axtree_bid
    model: gpt5_vision
    tool_harness: axtree_bid
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/perception_modes_smoke
    tags: [perception, axtree, bid]

  - id: tf_hybrid
    model: gpt5_vision
    tool_harness: hybrid_screenshot_axtree
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/perception_modes_smoke
    tags: [perception, hybrid]

  - id: tf_set_of_marks
    model: gpt5_vision
    tool_harness: set_of_marks
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/perception_modes_smoke
    tags: [perception, set_of_marks]

  - id: tf_marks_plus_axtree
    model: gpt5_vision
    tool_harness: marks_plus_axtree
    memory_harness: no_memory
    task: tf_discretize_toggle
    seeds: [0]
    trials: 1
    max_steps: 10
    output_dir: agentlens_results/perception_modes_smoke
    tags: [perception, marks_plus_axtree, browser_use_style]
