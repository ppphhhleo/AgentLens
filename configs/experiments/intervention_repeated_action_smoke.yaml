schema_version: "0.1"
id: intervention_repeated_action_smoke
description: Deterministic smoke test for warning-only repeated-action intervention.

models:
  - id: mock_screenshot_react
    provider: local
    name: mock_screenshot_react
    temperature: 0.0
    vision: true

tool_harnesses:
  - id: browser_capture_with_intervention
    runner: screenshot_react
    tier: browser_only
    tools:
      - browser.drag
      - task.final_answer
    prompt_version: screenshot_react_json_v1
    extra:
      headless: true
      settle_ms: 200
      viewport: {width: 1000, height: 700}
      intervention:
        enabled: true
        repeated_action:
          enabled: true
          threshold: 3
          mode: warn
          signature: type
          message: "You are repeating the same action. Pause, inspect the screen, and try a different strategy."

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

tasks:
  - id: repeated_drag_mock
    benchmark: custom
    task_id: intervention.repeated_drag_mock
    goal: Trigger repeated-action warning after three drag actions.
    start_url: https://example.com/
    capability_required: [browser_ui]
    validator: final_answer
    expected_answer: done
    answer_validator: exact
    extra:
      mock_actions:
        - type: drag
          path: [{x: 200, y: 200}, {x: 260, y: 220}]
        - type: drag
          path: [{x: 210, y: 210}, {x: 270, y: 230}]
        - type: drag
          path: [{x: 220, y: 220}, {x: 280, y: 240}]
        - type: final_answer
          answer: done

runs:
  - id: repeated_action_intervention_mock
    model: mock_screenshot_react
    tool_harness: browser_capture_with_intervention
    memory_harness: no_memory
    task: repeated_drag_mock
    seeds: [0]
    trials: 1
    max_steps: 5
    output_dir: agentlens_results/intervention_repeated_action_smoke
    tags: [intervention, repeated_action, mock]
