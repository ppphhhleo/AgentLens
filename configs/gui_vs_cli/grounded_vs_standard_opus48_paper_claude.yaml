id: gui_vs_cli_grounded_vs_standard_opus48_paper_claude
description: >
  Paired standard-vs-grounded GUI-vs-CLI run using the paper-style Claude
  computer agent adapter. This is an agent-structure comparison condition, not
  the AgentLens strict registered-tool GUI agent and not Claude Code CLI.

env_backend: docker
docker_image: agentlens-gui-vs-cli-runtime:latest
docker_platform: linux/amd64
docker_shm_size: 2g
docker_ready_timeout: 180
screen_size: [1920, 1080]
max_steps: 150
output_dir: runs/gui_vs_cli_grounded_vs_standard_opus48_paper_claude

agents:
  - id: gui_vs_cli_claude_opus48
    provider: anthropic
    model: claude-opus-4-8
    interaction_backend: gui_vs_cli_claude
    prompt_policy: gui_screen_only
    family: paper_style_gui_vs_cli
    max_output_tokens: 4096
    extra:
      screen_size: [1920, 1080]
      max_steps: 150
      platform: ubuntu
      computer_environment: linux

tasks:
  - id: gimp_add_alpha_transparent
    source_type: standard
    app: gimp
    category: image_editing

  - id: gimp_add_alpha_transparent
    source_type: grounded_prompt
    app: gimp
    category: image_editing

  - id: drawio_aws_cloud_arch
    source_type: standard
    app: drawio
    category: diagram_editing

  - id: drawio_aws_cloud_arch
    source_type: grounded_prompt
    app: drawio
    category: diagram_editing

  - id: godot4_full_enemy_controller
    source_type: standard
    app: godot4
    category: game_editor

  - id: godot4_full_enemy_controller
    source_type: grounded_prompt
    app: godot4
    category: game_editor

  - id: calc_3d_quarterly_consolidation
    source_type: standard
    app: libreoffice_calc
    category: spreadsheet_analysis

  - id: calc_3d_quarterly_consolidation
    source_type: grounded_prompt
    app: libreoffice_calc
    category: spreadsheet_analysis

  - id: impress_add_entry_animations_to_bullets
    source_type: standard
    app: libreoffice_impress
    category: presentation_editing

  - id: impress_add_entry_animations_to_bullets
    source_type: grounded_prompt
    app: libreoffice_impress
    category: presentation_editing

  - id: chrome_multi_tab_wikipedia
    source_type: standard
    app: chrome
    category: information_seeking

  - id: chrome_multi_tab_wikipedia
    source_type: grounded_prompt
    app: chrome
    category: information_seeking
