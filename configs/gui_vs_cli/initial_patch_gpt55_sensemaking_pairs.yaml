id: initial_patch_gpt55_sensemaking_pairs
description: >
  First GPT-5.5 desktop text/data-sensemaking component. The tasks reuse
  immutable GUI-vs-CLI seed artifacts and use answer-oriented AgentLens task
  overlays, with matched standard and grounded prompts.

env_backend: docker
docker_image: agentlens-gui-vs-cli-runtime:latest
docker_platform: linux/amd64
docker_shm_size: 2g
docker_ready_timeout: 180
screen_size: [1920, 1080]
max_steps: 500
output_dir: runs/initial_patch_gpt55_sensemaking_pairs

agents:
  - id: gpt55_oauth_gui_only
    provider: openai
    model: gpt-5.5
    auth_mode: codex_oauth
    interaction_backend: tool_call
    prompt_policy: gui_screen_only
    family: agentlens_strict_gui_toolcall
    max_output_tokens: 4096
    tools: &gui_only_tools
      - desktop.screenshot
      - desktop.click
      - desktop.double_click
      - desktop.triple_click
      - desktop.scroll
      - desktop.move
      - desktop.drag
      - desktop.type
      - desktop.keypress
      - desktop.wait
      - task.final_answer
    extra:
      input_modes: [screenshot]
      max_actions_per_round: 5
      parallel_tool_calls: true
      screen_size: [1920, 1080]

  - id: gpt55_native_computer_use
    provider: openai
    model: gpt-5.5
    auth_mode: api_key
    interaction_backend: gui_vs_cli_chatgpt
    prompt_policy: gui_screen_only
    family: paper_style_gui_vs_cli
    max_output_tokens: 4096
    extra:
      api_backend: openai
      screen_size: [1920, 1080]
      max_steps: 500
      platform: ubuntu
      computer_environment: linux

tasks:
  - id: calc_highest_average_salary_standard
    source_type: standard
    paired_task_id: calc_highest_average_salary
    agentlens_task_file: tasks/gui_vs_cli_authored/calc_highest_average_salary_standard/task.json
    app: libreoffice_calc
    category: text_data_sensemaking
    task_taxonomy: &calc_salary
      primary_type: SF
      sf_mode: analytic
      outcome_form: specified
      evidence_mode: text_data
      prompt_delta_strength: 2

  - id: calc_highest_average_salary_grounded
    source_type: grounded_prompt
    paired_task_id: calc_highest_average_salary
    agentlens_task_file: tasks/gui_vs_cli_authored/calc_highest_average_salary_grounded/task.json
    app: libreoffice_calc
    category: text_data_sensemaking
    task_taxonomy: *calc_salary

  - id: zotero_doi_year_lookup_standard
    source_type: standard
    paired_task_id: zotero_doi_year_lookup
    agentlens_task_file: tasks/gui_vs_cli_authored/zotero_doi_year_lookup_standard/task.json
    app: zotero
    category: text_data_sensemaking
    task_taxonomy: &zotero
      primary_type: SF
      sf_mode: foraging
      outcome_form: specified
      evidence_mode: text_data
      prompt_delta_strength: 2

  - id: zotero_doi_year_lookup_grounded
    source_type: grounded_prompt
    paired_task_id: zotero_doi_year_lookup
    agentlens_task_file: tasks/gui_vs_cli_authored/zotero_doi_year_lookup_grounded/task.json
    app: zotero
    category: text_data_sensemaking
    task_taxonomy: *zotero
