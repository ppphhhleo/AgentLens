id: gui_vs_cli_claude_opus46_initial_comparison
description: >
  Initial gui-vs-cli workflow comparison for Claude Opus 4.6 across three
  agent structures: AgentLens strict GUI-only tool calls, gui-vs-cli
  paper-style Claude computer agent, and gui-vs-cli paper-style Claude Code
  CLI-only agent.

env_backend: docker
docker_image: agentlens-gui-vs-cli-runtime:latest
docker_platform: linux/amd64
docker_shm_size: 2g
docker_ready_timeout: 180
screen_size: [1920, 1080]
max_steps: 60
output_dir: runs/gui_vs_cli_claude_opus46_initial_comparison

agents:
  - id: agentlens_gui_toolcall_claude_opus46
    provider: anthropic
    model: claude-opus-4-6
    interaction_backend: tool_call
    prompt_policy: gui_screen_only
    family: agentlens_strict_gui_toolcall
    max_output_tokens: 4096
    extra:
      parallel_tool_calls: true
      max_actions_per_round: 5
    tools: &strict_gui_tools
      - desktop.screenshot
      - desktop.click
      - desktop.double_click
      - desktop.scroll
      - desktop.move
      - desktop.drag
      - desktop.type
      - desktop.keypress
      - desktop.wait
      - task.final_answer

  - id: gui_vs_cli_claude_opus46
    provider: anthropic
    model: claude-opus-4-6
    interaction_backend: gui_vs_cli_claude
    prompt_policy: gui_screen_only
    family: paper_style_gui_vs_cli
    max_output_tokens: 4096
    extra:
      screen_size: [1920, 1080]
      max_steps: 400

  - id: gui_vs_cli_cli_claude_opus46
    provider: claude
    cli_provider: claude
    model: claude-opus-4-6
    interaction_backend: gui_vs_cli_cli
    family: paper_style_cli

tasks:
  - id: chrome_dom_inspection_wikipedia
    app: chrome
    category: browser_research

  - id: calc_3d_quarterly_consolidation
    app: libreoffice_calc
    category: spreadsheet_analysis

  - id: drawio_aws_cloud_arch
    app: drawio
    category: diagram_editing

  - id: cloudcompare_colorize_add_rgb
    app: cloudcompare
    category: point_cloud_visualization

  - id: gimp_add_alpha_transparent
    app: gimp
    category: image_editing
