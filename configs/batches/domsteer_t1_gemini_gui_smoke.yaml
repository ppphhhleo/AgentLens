schema_version: "0.1"
id: domsteer_t1_gemini_gui_smoke
description: >
  Focused DOMSteer DataVoyager T1 smoke for Gemini across two GUI-facing agent
  structures: AgentLens strict GUI-only registered tools and the gui-vs-cli
  paper-style Gemini computer agent.

models:
  - id: gemini_gui_toolcall
    provider: gemini
    name: gemini-2.5-flash
    temperature: 0.0
    vision: true
    max_output_tokens: 2048
    extra:
      interaction_backend: tool_call
      parallel_tool_calls: true
      max_actions_per_round: 5

  - id: gemini_gui_vs_cli
    provider: gemini
    name: gemini-2.5-flash
    temperature: 0.0
    vision: true
    max_output_tokens: 4096
    extra:
      interaction_backend: gui_vs_cli_gemini
      platform: ubuntu
      computer_environment: linux
      gui_screen_only_policy: true
      screen_size: [1600, 900]
      max_steps: 400

tool_harnesses:
  - id: desktop_gui_toolcall
    runner: desktop_react
    tier: full_sandbox
    tools:
      - desktop.screenshot
      - desktop.click
      - desktop.double_click
      - desktop.scroll
      - desktop.move
      - desktop.drag
      - desktop.type
      - desktop.keypress
      - desktop.wait
      - task.final_answer
    prompt_version: tool_call_desktop_gui_v1
    extra:
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      desktop_start_cmd_template: >-
        nohup bash -lc "if command -v google-chrome >/dev/null 2>&1; then exec google-chrome --no-sandbox --disable-dev-shm-usage {start_url}; elif command -v chromium-browser >/dev/null 2>&1; then exec chromium-browser --no-sandbox --disable-dev-shm-usage {start_url}; elif command -v chromium >/dev/null 2>&1; then exec chromium --no-sandbox --disable-dev-shm-usage {start_url}; else exec xdg-open {start_url}; fi" >/tmp/agentlens_start_browser.log 2>&1 &
      settle_ms: 5000
      screenshot_source: virtual_desktop
      coordinate_frame: desktop_screen
      max_actions_per_round: 5
      model_max_attempts: 6
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

  - id: desktop_gui_gui_vs_cli_gemini
    runner: desktop_react
    tier: full_sandbox
    tools:
      - desktop.screenshot
      - desktop.pyautogui
      - desktop.wait
      - task.final_answer
    prompt_version: gui_vs_cli_gemini_paper_v1
    extra:
      sandbox_image: ghcr.io/agent-infra/sandbox:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      sandbox_watch_paths: [/home/gem, /tmp, /home/gem/Downloads]
      desktop_start_cmd_template: >-
        nohup bash -lc "if command -v google-chrome >/dev/null 2>&1; then exec google-chrome --no-sandbox --disable-dev-shm-usage {start_url}; elif command -v chromium-browser >/dev/null 2>&1; then exec chromium-browser --no-sandbox --disable-dev-shm-usage {start_url}; elif command -v chromium >/dev/null 2>&1; then exec chromium --no-sandbox --disable-dev-shm-usage {start_url}; else exec xdg-open {start_url}; fi" >/tmp/agentlens_start_browser.log 2>&1 &
      settle_ms: 5000
      screenshot_source: virtual_desktop
      coordinate_frame: desktop_screen
      max_actions_per_round: 5
      model_retry_sleep_s: 2.0
      model_retry_max_sleep_s: 60.0

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

task_files:
  - tasks/domsteer/datavoyager_most_fuel_efficient/task.yaml

tasks: []

runs:
  - id: dv_t1__gemini__gui_toolcall
    model: gemini_gui_toolcall
    tool_harness: desktop_gui_toolcall
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    max_steps: 40
    output_dir: runs/domsteer_t1_gemini_gui_smoke/raw
    tags: [domsteer, datavoyager, t1, gemini, gui_only, agentlens_toolcall]

  - id: dv_t1__gemini__gui_vs_cli
    model: gemini_gui_vs_cli
    tool_harness: desktop_gui_gui_vs_cli_gemini
    memory_harness: no_memory
    task: datavoyager_most_fuel_efficient
    seeds: [0]
    trials: 1
    max_steps: 40
    output_dir: runs/domsteer_t1_gemini_gui_smoke/raw
    tags: [domsteer, datavoyager, t1, gemini, computer_agent, gui_vs_cli_gemini]
