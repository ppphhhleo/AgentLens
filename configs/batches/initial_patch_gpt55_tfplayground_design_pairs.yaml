schema_version: "0.1"
id: initial_patch_gpt55_tfplayground_design_pairs
description: >
  TensorFlow Playground open-ended-production component of the balanced GPT-5.5
  task set. Every trial opens the bare Playground URL in a fresh browser
  profile, captures an unrecorded initial state, and uses a final-state
  screenshot LLM judge that ignores network architecture compliance.

models:
  - id: gpt55_oauth_gui_only
    provider: openai
    name: gpt-5.5
    auth_mode: codex_oauth
    temperature: 0.0
    vision: true
    max_output_tokens: 4096
    extra:
      interaction_backend: tool_call
      parallel_tool_calls: true
      max_actions_per_round: 5

  - id: gpt55_native_computer_use
    provider: openai
    name: gpt-5.5
    auth_mode: api_key
    temperature: 0.0
    vision: true
    max_output_tokens: 4096
    extra:
      interaction_backend: gui_vs_cli_chatgpt
      api_backend: openai
      platform: ubuntu
      computer_environment: linux
      screen_size: [1920, 1080]
      max_steps: 500

tool_harnesses:
  - id: desktop_gui_only
    runner: desktop_react
    tier: gui_only
    tools: &gui_only_tools
      - computer.batch
      - desktop.screenshot
      - desktop.click
      - desktop.double_click
      - desktop.triple_click
      - desktop.scroll
      - desktop.move
      - desktop.drag
      - desktop.type
      - desktop.keypress
      - desktop.wait
      - task.final_answer
    prompt_version: tool_call_desktop_gui_v1
    extra:
      agent_type: gui_only
      interaction_protocol: registered_tools
      sandbox_image: agentlens/desktop-poc:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      desktop_start_cmd_template: >-
        nohup bash -lc "if command -v google-chrome >/dev/null 2>&1; then exec google-chrome --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; elif command -v chromium-browser >/dev/null 2>&1; then exec chromium-browser --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; else exec chromium --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; fi" >/tmp/agentlens_start_browser.log 2>&1 &
      settle_ms: 5000
      screenshot_source: virtual_desktop
      coordinate_frame: desktop_screen
      parallel_tool_calls: true
      max_actions_per_round: 5
      fresh_browser_profile_per_run: true
      record_setup_actions: false

  - id: desktop_computer_use
    runner: desktop_react
    tier: computer_use
    tools:
      - computer.batch
      - desktop.screenshot
      - desktop.pyautogui
      - desktop.wait
      - task.final_answer
    prompt_version: gui_vs_cli_chatgpt_paper_v1
    extra:
      agent_type: computer_use
      interaction_protocol: native_computer
      sandbox_image: agentlens/desktop-poc:latest
      sandbox_port: 8080
      sandbox_shm_size: 2g
      sandbox_cap_add: [SYS_ADMIN]
      sandbox_security_opt: [seccomp=unconfined]
      desktop_start_cmd_template: >-
        nohup bash -lc "if command -v google-chrome >/dev/null 2>&1; then exec google-chrome --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; elif command -v chromium-browser >/dev/null 2>&1; then exec chromium-browser --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; else exec chromium --no-sandbox --disable-dev-shm-usage --start-maximized {start_url}; fi" >/tmp/agentlens_start_browser.log 2>&1 &
      settle_ms: 5000
      screenshot_source: virtual_desktop
      coordinate_frame: desktop_screen
      max_actions_per_round: 5
      fresh_browser_profile_per_run: true
      record_setup_actions: false

memory_harnesses:
  - id: no_memory
    kind: none
    scope: none

task_files:
  - tasks/domsteer/tfplayground_regression_two_datasets/task.yaml
  - tasks/domsteer/tfplayground_regression_two_datasets_grounded/task.yaml
  - tasks/domsteer/tfplayground_classification_four_datasets/task.yaml
  - tasks/domsteer/tfplayground_classification_four_datasets_grounded/task.yaml

tasks: []

runs:
  - &regression_standard
    id: tfplayground_regression_two_datasets__standard__gpt55__gui_only
    model: gpt55_oauth_gui_only
    tool_harness: desktop_gui_only
    memory_harness: no_memory
    task: tfplayground_regression_two_datasets
    seeds: [0]
    trials: 1
    max_steps: 500
    output_dir: runs/initial_patch_gpt55_tfplayground_design_pairs/raw
    tags: [initial_patch, op, regression, standard, gpt55, gui_only]
  - <<: *regression_standard
    id: tfplayground_regression_two_datasets__grounded__gpt55__gui_only
    task: tfplayground_regression_two_datasets_grounded
    tags: [initial_patch, op, regression, grounded, gpt55, gui_only]
  - <<: *regression_standard
    id: tfplayground_regression_two_datasets__standard__gpt55__computer_use
    model: gpt55_native_computer_use
    tool_harness: desktop_computer_use
    tags: [initial_patch, op, regression, standard, gpt55, computer_use]
  - <<: *regression_standard
    id: tfplayground_regression_two_datasets__grounded__gpt55__computer_use
    model: gpt55_native_computer_use
    tool_harness: desktop_computer_use
    task: tfplayground_regression_two_datasets_grounded
    tags: [initial_patch, op, regression, grounded, gpt55, computer_use]

  - &classification_standard
    id: tfplayground_classification_four_datasets__standard__gpt55__gui_only
    model: gpt55_oauth_gui_only
    tool_harness: desktop_gui_only
    memory_harness: no_memory
    task: tfplayground_classification_four_datasets
    seeds: [0]
    trials: 1
    max_steps: 500
    output_dir: runs/initial_patch_gpt55_tfplayground_design_pairs/raw
    tags: [initial_patch, op, classification, standard, gpt55, gui_only]
  - <<: *classification_standard
    id: tfplayground_classification_four_datasets__grounded__gpt55__gui_only
    task: tfplayground_classification_four_datasets_grounded
    tags: [initial_patch, op, classification, grounded, gpt55, gui_only]
  - <<: *classification_standard
    id: tfplayground_classification_four_datasets__standard__gpt55__computer_use
    model: gpt55_native_computer_use
    tool_harness: desktop_computer_use
    tags: [initial_patch, op, classification, standard, gpt55, computer_use]
  - <<: *classification_standard
    id: tfplayground_classification_four_datasets__grounded__gpt55__computer_use
    model: gpt55_native_computer_use
    tool_harness: desktop_computer_use
    task: tfplayground_classification_four_datasets_grounded
    tags: [initial_patch, op, classification, grounded, gpt55, computer_use]
