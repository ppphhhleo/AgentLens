    grounded_procedure: >
      Use DataVoyager to analyze the cars dataset and count cars matching three
      conditions: Origin is Europe, Horsepower is greater than 100, and
      Cylinders equals 4. In the Encodings panel, add Origin, Horsepower, and
      Cylinders to the view or filters so you can isolate the matching records.
